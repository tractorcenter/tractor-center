<header class="topbar">
  <div class="wrap topbar-inner">
    <a class="brand" href="{{ .BaseURL }}/" aria-label="ТракторЦентр">
      <img class="brand-logo" src="{{ index .Settings "brand_logo" }}" alt="Логотип ТракторЦентр" />
      <span class="brand-text">ТракторЦентр</span>
    </a>
    <nav class="nav">
      <a href="{{ .BaseURL }}/#services">Услуги</a>
      <a href="{{ .BaseURL }}/#lead-form">Заявка</a>
      <a href="{{ .BaseURL }}/#partners">Партнеры</a>
      <a href="{{ .BaseURL }}/#contacts">Контакты</a>
    </nav>
    <a class="phone topbar-phone-desktop" href="tel:{{ index .Settings "primary_phone_href" }}">{{ index .Settings "primary_phone" }}</a>
    <a class="topbar-phone-mobile" href="tel:{{ index .Settings "primary_phone_href" }}" aria-label="Позвонить в ТракторЦентр">
      <span aria-hidden="true">☎</span>
    </a>
  </div>
